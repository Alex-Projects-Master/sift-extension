<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sift</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F6F6F1;
      color: #111827;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      padding: 16px;
      background: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-logo {
      width: 24px;
      height: 24px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .loading, .error, .empty {
      padding: 40px 16px;
      text-align: center;
      font-size: 14px;
      color: #6B7280;
    }

    .error { color: #DC2626; }

    .product {
      padding: 16px;
      background: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
    }

    .product-top {
      display: flex;
      gap: 12px;
    }

    .product-img {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      background: #F6F6F1;
    }

    .product-info {
      flex: 1;
      min-width: 0;
    }

    .product-store {
      font-size: 11px;
      font-weight: 600;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .product-name {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .prices {
      margin-top: 8px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .price-current {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      letter-spacing: -0.02em;
    }

    .price-was {
      font-size: 14px;
      color: #6B7280;
      text-decoration: line-through;
    }

    .price-loyalty {
      font-size: 14px;
      font-weight: 600;
      color: #16A34A;
    }

    .offer-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 8px;
      background: #FEF3C7;
      color: #92400E;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
    }

    .actions {
      padding: 16px;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-primary {
      background: #FF5701;
      color: #FFFFFF;
    }

    .btn-primary:hover {
      background: #E64D00;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      background: #E5E7EB;
      color: #6B7280;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #FFFFFF;
      color: #111827;
      border: 1px solid #E5E7EB;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: #F9FAFB;
    }

    .success {
      padding: 40px 16px;
      text-align: center;
      color: #16A34A;
      font-weight: 600;
      font-size: 14px;
    }

    .login-form {
      padding: 16px;
    }

    .login-form label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #111827;
      margin-bottom: 4px;
    }

    .login-form input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      margin-bottom: 12px;
      background: #FFFFFF;
      transition: border-color 0.15s ease;
    }

    .login-form input:focus {
      outline: none;
      border-color: #FF5701;
      box-shadow: 0 0 0 3px rgba(255, 87, 1, 0.1);
    }

    .login-form .error-msg {
      color: #DC2626;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .login-form .subtitle {
      font-size: 13px;
      color: #6B7280;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
